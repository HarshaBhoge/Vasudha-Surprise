<!DOCTYPE html>

<head>

<title>Vasudha</title>
<style>
  *, *::after, *::before {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    height: 100vh;
  }

  /* Colorful sky background instead of black night */
  .sky {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg,
      #ff9a9e 0%,
      #fad0c4 15%,
      #fbc2eb 30%,
      #a6c1ee 55%,
      #84fab0 80%,
      #8fd3f4 100%);
  }

  /* soft drifting clouds for depth */
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.55);
    border-radius: 50%;
    filter: blur(2px);
    animation: drift linear infinite;
  }
  .cloud--1 { width: 18vmin; height: 6vmin; top: 12%; left: -20vmin; animation-duration: 40s; }
  .cloud--2 { width: 25vmin; height: 8vmin; top: 25%; left: -30vmin; animation-duration: 55s; animation-delay: -10s; }
  .cloud--3 { width: 14vmin; height: 5vmin; top: 8%; left: -15vmin; animation-duration: 33s; animation-delay: -20s; }

  @keyframes drift {
    from { transform: translateX(0); }
    to { transform: translateX(140vw); }
  }

  .title {
    position: absolute;
    top: 0;
    left: 0;
    color: #ffffff;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-content: center;
    align-items: center;
    width: 100%;
    height: 45vh;
    text-shadow: 0 0 20px rgba(255,255,255,0.9), 0 2px 6px rgba(0,0,0,0.25);
    letter-spacing: 0px;
    z-index: 20;
    font-size: 6vmin;
    font-weight: bold;
  }

  @media (min-width: 500px) {
    .title { letter-spacing: 15px; }
  }

  @keyframes typing {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .title span {
    opacity: 0;
    animation: typing 1s ease forwards;
    animation-delay: var(--delay);
  }

  /* Real butterfly, drawn in SVG so it always renders (no emoji font dependency) */
  .butterfly {
    position: absolute;
    width: 9vmin;
    height: 9vmin;
    z-index: 50;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    animation-name: fly-butterfly;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }

  .butterfly-orient {
    width: 100%;
    height: 100%;
    transform: rotate(90deg);
  }

  .butterfly svg {
    width: 100%;
    height: 100%;
    animation: flutter 0.3s ease-in-out infinite alternate;
    transform-origin: center;
  }

  .butterfly--1 { bottom: 55vmin; left: -10vmin; animation-duration: 14s; }
  .butterfly--2 { bottom: 30vmin; left: -10vmin; animation-duration: 18s; animation-delay: -4s; }
  .butterfly--3 { bottom: 42vmin; left: -10vmin; animation-duration: 16s; animation-delay: -8s; }

  .butterfly--1 svg .wing { fill: #ff6b9d; }
  .butterfly--1 svg .wing-inner { fill: #ffd166; }
  .butterfly--2 svg .wing { fill: #6bc5ff; }
  .butterfly--2 svg .wing-inner { fill: #b6f542; }
  .butterfly--3 svg .wing { fill: #c084fc; }
  .butterfly--3 svg .wing-inner { fill: #ff9a3c; }

  @keyframes fly-butterfly {
    0%   { transform: translate(0, 0); }
    20%  { transform: translate(30vw, -8vmin); }
    40%  { transform: translate(60vw, 4vmin); }
    60%  { transform: translate(90vw, -6vmin); }
    80%  { transform: translate(115vw, 3vmin); }
    100% { transform: translate(140vw, 0); }
  }

  @keyframes flutter {
    from { transform: scaleX(1) rotate(-4deg); }
    to   { transform: scaleX(0.7) rotate(4deg); }
  }

  /* Garden / grass strip at the bottom */
  .garden {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 18vh;
    background: linear-gradient(180deg, #6bbf59 0%, #3f9142 60%, #2e6e33 100%);
    display: flex;
    align-items: flex-end;
    z-index: 10;
  }

  .grass {
    width: 4vmin;
    height: 10vmin;
    background: #2e8b3d;
    margin: 0 0.5vmin;
    border-radius: 50% 50% 0 0;
    transform-origin: bottom center;
    animation: sway 2.5s ease-in-out infinite alternate;
  }
  .grass:nth-child(odd) { animation-delay: -1s; height: 12vmin; background: #35a047; }
  .grass:nth-child(3n) { height: 8vmin; background: #257a34; }

  @keyframes sway {
    from { transform: rotate(-4deg); }
    to   { transform: rotate(4deg); }
  }

  /* Simple flowers dotted along the garden */
  .flower-emoji {
    position: absolute;
    bottom: 14vh;
    font-size: 4vmin;
    animation: sway 3s ease-in-out infinite alternate;
  }

  /* Next button */
  .next-btn {
     position: fixed;
  bottom: 30px;
  right: 30px;
  padding: 12px 25px;
  border: 2px solid white;
  border-radius: 30px;
  background: transparent;
  color: white;
  font-size: 18px;
  cursor: pointer;
  z-index: 9999;
  }
  /* .next-btn:hover {

  } */

  @keyframes fade-in-btn {
    to { opacity: 1; pointer-events: auto; }
  }

  /* Page 1 wrapper fades out when Next is clicked */
  .page-1 {
    transition: opacity 0.8s ease;

    opacity: 0;
    pointer-events: none;

  /* Page 2: revealed after Next */

    position: fixed;

    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    background: #000;
  }

    opacity: 1;
    pointer-events: auto;

</style>
